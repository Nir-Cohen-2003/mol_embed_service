[project]
name = "mol-embed-service"
version = "0.1.0"
description = "Efficient GPU-accelerated molecular embedding service"
authors = ["Nir Cohen <your.email@example.com>"]
channels = ["conda-forge", "pytorch", "nvidia"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10,<3.12"
pytorch = ">=2.1"
pytorch-cuda = "12.1.*"
transformers = ">=4.35"
rdkit = ">=2023.09"
numpy = ">=1.24"
sentencepiece = ">=0.1.99"

[pypi-dependencies]
cddd-onnx = ">=0.1.0"

[feature.dev.dependencies]
pytest = ">=7.4"
ruff = ">=0.1"
pyrefly ="*"
[tasks]
test = "pytest tests/"
lint = "ruff check mol_embed_service/"
check = "pyrefly check mol_embed_service/"
